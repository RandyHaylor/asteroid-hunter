<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Asteroid Hunter</title>
  </head>
  <body>
    <!-- D35: the game renders into a centered SQUARE; controls live in the letterbox margins.
         #gameRenderCanvas + #viewHudOverlay are sized/positioned to the square by main.ts;
         #controlsOverlay is full-window and holds the buttons placed into the margins. -->
    <canvas id="gameRenderCanvas"></canvas>
    <div id="viewHudOverlay"></div>
    <div id="controlsOverlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
